# engine-v2 substrate parity gate.
#
# Runs the v2 strategy substrate parity test: the v2 execution adapter
# (pandas vs polars) for the mask strategies. Triggers on changes to the
# v2 execution package.
#
# The job must be green (xfail-with-deferral counts as green and is recorded
# in the S13 readiness report) or the PR does not merge.
#
# Note: the former V1 graph-op parity job was removed when the V1 graph
# runner was deleted (S22-CL-V1GRAPHRUNNER, commit b9b73e1). That engine and
# its parity test (tests/parity/test_relational_ops_parity.py) no longer
# exist; only the v2 strategy path survives.

name: engine-v2-parity

on:
  push:
    branches: [main]
    paths:
      - "src/decoy_engine/execution/**"
      - ".github/workflows/engine-v2-parity.yml"
  pull_request:
    paths:
      - "src/decoy_engine/execution/**"
      - ".github/workflows/engine-v2-parity.yml"

jobs:
  strategy_parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install engine + dev extras
        run: pip install -e ".[dev]"
      - name: v2 strategy substrate parity (pandas adapter vs polars adapter)
        run: pytest tests/parity/test_strategy_substrate_parity.py --tb=short

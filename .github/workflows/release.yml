name: release

# Publish decoy-engine to PyPI via trusted publishing (OIDC, no API token).
#
# Trigger: push a version tag like `v0.1.0`. workflow_dispatch is allowed
# for re-runs, but the `publish` job is gated to release tags only, so a
# manual dispatch on a branch builds but never publishes.
#
# ORDERING: publish this BEFORE decoy-cli. The CLI depends on
# `decoy-engine>=0.1.0`; if the engine is not on PyPI first, installing
# the CLI fails to resolve for users.
#
# ONE-TIME SETUP:
#   1. PyPI pending publisher (https://docs.pypi.org/trusted-publishers/)
#      for project `decoy-engine`: Owner louiskeep, Repo decoy-engine,
#      Workflow release.yml, Environment pypi. No token is ever stored.
#   2. GitHub -> Settings -> Environments -> `pypi`: add required reviewers
#      (manual approval before publish) AND a deployment branch/tag rule
#      that only permits the tag pattern `v*`. Without that rule, anyone
#      with repo write access can publish.
#
# Actions are pinned to commit SHAs because the publish job runs with
# id-token: write. Keep them current via Dependabot (github-actions).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build and check
        run: |
          python -m pip install build==1.5.0 twine==6.2.0
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    # Publish ONLY for release tags, even when triggered via workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1

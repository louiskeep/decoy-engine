name: release

# Publish decoy-engine to PyPI via trusted publishing (OIDC, no API token).
#
# Trigger: push a version tag like `v0.1.0`, or run manually.
#
# ORDERING: publish this BEFORE decoy-cli. The CLI depends on
# `decoy-engine>=0.1.0`; if the engine is not on PyPI first, installing
# the CLI fails to resolve for users.
#
# ONE-TIME PyPI SETUP (https://docs.pypi.org/trusted-publishers/):
#   On PyPI, register a "pending publisher" for project `decoy-engine` with:
#     Owner: louiskeep   Repository: decoy-engine
#     Workflow: release.yml   Environment: pypi
#   No API token or secret is stored anywhere; PyPI trusts this exact
#   repo + workflow + environment via OIDC.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

# V2.0-prep CI workflow.
#
# Three separate jobs (ruff / mypy / pytest) so a failure points at the
# specific gate that tripped. Each job is fast (~20 s cold; <10 s warm
# via pip cache) and runs on every push + pull request.
#
# Why three jobs and not one combined: a single shell-step setup keeps
# the YAML short, but combined jobs hide which gate broke the build.
# When a contributor sees "CI failed" they want to see "ruff" vs
# "mypy" vs "pytest" at a glance, not scroll through interleaved logs.
#
# Why no separate self-hosted runner yet: the V2.0-prep tier of lint +
# type + pytest runs comfortably on ubuntu-latest. Self-hosted infra
# arrives in V2.x for the benchmark guardrail (per engineering-best-
# practices section 7.3, sub-second perf numbers from shared runners
# are noise).

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install ruff
        # Pinned: ruff ships new lint rules in minor releases, which turn
        # previously-green code red with zero code change. Bump deliberately
        # alongside a lint pass, not implicitly on every CI run. Version
        # mirrors the [lint] dev-deps group in pyproject.toml.
        run: pip install ruff==0.15.14
      - name: Lint
        run: ruff check src tests
      - name: Format check
        run: ruff format --check src tests

  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install engine + dev extras
        # mypy pinned for the same reason as ruff: a minor bump can surface
        # new error categories on unchanged code. Version mirrors the [lint]
        # dev-deps group in pyproject.toml.
        run: pip install -e ".[dev]" mypy==2.1.0
      - name: Type check
        run: mypy src/decoy_engine

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install engine + dev extras
        run: pip install -e ".[dev]"
      - name: Unit + integration tests
        # Benchmark suite excluded from CI per resolved question #19;
        # benchmarks run on a dedicated SKU on a separate schedule.
        run: pytest tests -m "not benchmark" --tb=short
      - name: Sentry tests (security policies)
        # Sentries are part of `pytest tests` above, but called out
        # explicitly so CI logs make it obvious the policy checks ran.
        run: pytest tests/sentry --tb=short

# Build (and on main, deploy) the engine API reference docs.
#
# Build runs on every push and PR that touches docs/, src/decoy_engine/,
# or pyproject.toml. The deploy job runs only on main pushes and only
# after build succeeds.
#
# ── GitHub Pages requirements ────────────────────────────────────────────
# Before the deploy job can succeed, Pages must be enabled in repo settings:
#   Settings → Pages → Source: GitHub Actions
#
# This repo (louiskeep/decoy-engine) is private. Pages on private repos
# requires a paid plan (GitHub Pro / Team / Enterprise). On the free tier,
# the build job still works (HTML is uploaded as a workflow artifact and
# downloadable from the Actions UI) but the deploy job fails with a
# permissions error. If a paid plan isn't planned, comment out the deploy
# job below and let the build job stand alone — contributors can still
# preview the artifact, just not via a public URL.
#
# Item 50 Phase E in the cross-repo plan.

name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/decoy_engine/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'src/decoy_engine/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Pages deploy needs these scopes; keep `contents: read` so the build job
# can `git checkout` without elevated permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize concurrent deploys; cancel-in-progress=false so an in-flight
# deploy isn't aborted mid-write (which can leave Pages in a half-deployed
# state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[docs]

      - name: Build (warnings as errors)
        # -W: treat warnings as errors. Mirrors the local `make html-strict`
        # contract — a green local build is what lands on Pages.
        # --keep-going: collect every error in one pass rather than bailing
        # on the first, so a contributor sees the whole picture.
        run: sphinx-build -b html -W --keep-going docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  # Only deploy on main, AND only when the DOCS_DEPLOY repo variable is
  # "true". The repo is private pre-launch and Pages needs the repo public
  # (or a paid plan), so deploy stays OFF until launch to keep main green.
  # Flip DOCS_DEPLOY to "true" in Settings -> Secrets and variables ->
  # Actions -> Variables when the repo goes public at launch. PRs still get
  # the build for validation (HTML downloadable as a workflow artifact);
  # they never overwrite the live site.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCS_DEPLOY == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

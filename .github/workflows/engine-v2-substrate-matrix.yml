# engine-v2 substrate matrix (S11).
#
# Runs the test suite under both execution substrates (pandas, polars) so the
# polars path is exercised on every change that touches the execution package.
# Per the substrate-decision doc: the matrix runs both substrates for the
# duration of the migration window (S11 through S13); once the default flips to
# polars at S13 close, pandas drops to a nightly-only run.
#
# Trigger is scoped to the execution package (Engine-reality note #3: the v2
# masking spine + parity triggers key off decoy_engine/execution/**), so a PR
# that does not touch execution does not pay the doubled runtime.

name: engine-v2-substrate-matrix

on:
  push:
    branches: [main]
    paths:
      - "src/decoy_engine/execution/**"
      - ".github/workflows/engine-v2-substrate-matrix.yml"
  pull_request:
    paths:
      - "src/decoy_engine/execution/**"
      - ".github/workflows/engine-v2-substrate-matrix.yml"

jobs:
  substrate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        substrate: [pandas, polars]
    env:
      DECOY_SUBSTRATE: ${{ matrix.substrate }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
      - name: Install engine + dev extras
        run: pip install -e ".[dev]"
      - name: Execution tests under DECOY_SUBSTRATE=${{ matrix.substrate }}
        # Benchmark suite excluded per resolved question #19 (dedicated SKU).
        run: pytest tests -m "not benchmark" --tb=short

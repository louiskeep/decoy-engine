# R6.10 Dependabot config for decoy-engine.
#
# Locked policy (R6 Lock 4): GitHub Dependabot is the V1 vulnerability-scan
# gate. Engine is pure Python; no web bundle. Mirrors the platform cadence
# so engine + platform deps surface together on Monday mornings.

version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
    labels: ["deps", "python"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2
    labels: ["deps", "ci"]

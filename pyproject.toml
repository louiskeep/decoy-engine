[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "decoy-engine"
version = "0.1.0"
description = "Shared data masking and synthetic generation engine for the Decoy product family"
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "louiskeep" }]
dependencies = [
    "pandas>=1.5.0",
    "pyyaml>=6.0",
    "faker>=13.0.0",
    "psutil>=5.9.0",
    "pyarrow>=14.0.0",
    # Used by decoy_engine.disguises.schema for the Disguise model.
    # Was always required at runtime; was undeclared until benchmark CI
    # caught the gap on a fresh-environment install.
    "pydantic>=2.0",
]

# polars + duckdb stay optional through Phase 7 so a pandas-only install keeps
# its current footprint while we migrate. They graduate to required deps when
# Phase 8 flips `engine: hybrid` to default.
[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]
hybrid = [
    "polars>=1.0",
    "duckdb>=0.10.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/decoy_engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
markers = [
    "benchmark: informational performance benchmarks; not a regression gate",
]

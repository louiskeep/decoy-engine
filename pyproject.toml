    "decoy_engine.providers_v2.identifiers",
    "decoy_engine.providers_v2.identifiers._ein",
    "decoy_engine.providers_v2.identifiers._errors",
    "decoy_engine.providers_v2.identifiers._mrn",
    "decoy_engine.providers_v2.identifiers._ndc",
    "decoy_engine.providers_v2.identifiers._npi",
    "decoy_engine.providers_v2.identifiers._ssn",
    "decoy_engine.providers_v2.identifiers._validate",
    # engine-v2 S7 (Mimesis Adapter, conditional adoption). Spec:
    # docs/v2/sprints/engine-v2/sprint-07-mimesis-adapter.md in decoy-platform.
    # Per best-practices §5.4 + S7 spec §1. Optional dep: the modules import
    # mimesis behind a guard, but the strict gate still covers the source.
    "decoy_engine.providers_v2.mimesis",
    "decoy_engine.providers_v2.mimesis._adapter",
    "decoy_engine.providers_v2.mimesis._adoption_matrix",
    "decoy_engine.providers_v2.mimesis._parity",
    # engine-v2 S5 (Pool Manager). Spec:
    # docs/v2/sprints/engine-v2/sprint-05-pool-manager.md in decoy-platform.
    # Per best-practices §5.4 + S5 spec §Done state.
    "decoy_engine.generation",
    "decoy_engine.generation.pool",
    "decoy_engine.generation.pool._builder",
    "decoy_engine.generation.pool._cache",
    "decoy_engine.generation.pool._canonicalize",
    "decoy_engine.generation.pool._cardinality",
    "decoy_engine.generation.pool._errors",
    "decoy_engine.generation.pool._events",
    "decoy_engine.generation.pool._pool_adapter",
    "decoy_engine.generation.pool._sampler",
    "decoy_engine.generation.pool._validate",
    "decoy_engine.generation.pool._value_pool",
    # engine-v2 S8 (Composite Generators). Spec:
    # docs/v2/sprints/engine-v2/sprint-08-composite-generators.md in decoy-platform.
    # Per best-practices §5.4 + S8 spec §1.
    "decoy_engine.generation.composite",
    "decoy_engine.generation.composite._bundle_pool",
    "decoy_engine.generation.composite._city_state_zip",
    "decoy_engine.generation.composite._errors",
    "decoy_engine.generation.composite._generator",
    "decoy_engine.generation.composite._name_email",
    "decoy_engine.generation.composite._validate",
    # engine-v2 S9 (Execution Adapter, pandas). Spec:
    # docs/v2/sprints/engine-v2/sprint-09-execution-adapter-pandas.md in decoy-platform.
    # Per best-practices §5.4 + S9 spec §Done state. Slice 1: runner core; later
    # slices add the adapter + strategies modules.
    "decoy_engine.execution",
    "decoy_engine.execution._adapter",
    "decoy_engine.execution._errors",
    "decoy_engine.execution._events",
    "decoy_engine.execution._pandas_adapter",
    "decoy_engine.execution._runner",
    "decoy_engine.execution._strategies",
    "decoy_engine.execution._strategies._bucketize",
    "decoy_engine.execution._strategies._categorical",
    "decoy_engine.execution._strategies._composite",
    "decoy_engine.execution._strategies._date_shift",
    "decoy_engine.execution._strategies._faker",
    "decoy_engine.execution._strategies._formula",
    "decoy_engine.execution._strategies._fpe",
    "decoy_engine.execution._strategies._hash",
    "decoy_engine.execution._strategies._orphan",
    "decoy_engine.execution._strategies._passthrough",
    "decoy_engine.execution._strategies._redact",
    "decoy_engine.execution._strategies._shuffle",
    "decoy_engine.execution._strategies._truncate",
]
disallow_any_generics = true
disallow_subclassing_any = true
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
warn_return_any = true
no_implicit_reexport = true

[[tool.mypy.overrides]]
# Third-party libs without type stubs. Listed individually so a new
# missing-stubs surface trips review instead of silently passing.
module = [
    "duckdb",
    "duckdb.*",
    "faker",
    "faker.*",
    # mimesis (MIT) is an optional alternative provider backend (the
    # `mimesis` extra); imported at module top in providers_v2.mimesis,
    # not installed in default-extras CI.
    "mimesis",
    "mimesis.*",
    "pandas",
    "pandas.*",
    "polars",
    "polars.*",
    "psutil",
    "psutil.*",
    "pyarrow",
    "pyarrow.*",
    "yaml",
    # simpleeval (MIT) ships no stubs / py.typed; imported by
    # decoy_engine.expressions for the formula sandbox.
    "simpleeval",
    # jsonpath-ng ships no stubs; imported by the nested masking strategy.
    "jsonpath_ng",
    "jsonpath_ng.*",
    # Cloud SDKs ship no usable stubs for our call surface; imported
    # function-locally in decoy_engine.profile._source.
    "boto3",
    "botocore",
    "botocore.*",
    "google.cloud",
    "google.cloud.*",
]
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# Bounded shrink-only allowlist for pre-V2 type debt.
#
# Replaces an earlier blanket `ignore_errors = true` per module, which let
# arbitrary new error categories slip in silently. Now each legacy module
# enumerates the specific error codes that fire today; any code that is
# NOT on the list still trips CI for that module. Removing a code from a
# list is allowed (it tightens the gate); adding one requires a comment
# explaining the new debt category and which sprint will close it.
#
# Each module is also tagged with its scheduled deletion or refactor
# sprint per the V2 sprint plan; V2.1 entries vanish with the files,
# V2.0-B/C entries shrink as those sprints land.
# ---------------------------------------------------------------------------

# masker.masker — V2.1 hard delete (legacy IOHandler-bound Masker).
[[tool.mypy.overrides]]
module = ["decoy_engine.masker.masker"]
disable_error_code = ["attr-defined"]

# generators.* — V2.1 hard delete (legacy DataGenerator).
[[tool.mypy.overrides]]
module = ["decoy_engine.generators.generator"]
disable_error_code = ["var-annotated"]

[[tool.mypy.overrides]]
module = ["decoy_engine.generators.relationships"]
disable_error_code = ["call-arg"]

# generators.columns — V2.1 hard delete. `index` debt surfaced by
# V2.0-C tightening deterministic_hash to return str | None; the
# callsite filters nulls upstream so the slice is safe. `arg-type`:
# year-bin parsing calls int()/float() on config dict values typed
# Any | None and catches the TypeError on None deliberately; the guard
# is the runtime contract, not a type to refine in a doomed module.
[[tool.mypy.overrides]]
module = ["decoy_engine.generators.columns"]
disable_error_code = ["index", "arg-type"]

# transforms.{hash,categorical,faker_based} — V2.1 candidates for the
# legacy V1 Masker stack. `index` / `return-value` debt is the same
# str|None pattern surfaced by the V2.0-C deterministic_hash tightening;
# the V2.0-D transform-pipeline refactor clears them.
[[tool.mypy.overrides]]
module = ["decoy_engine.transforms.hash"]
disable_error_code = ["index"]

[[tool.mypy.overrides]]
module = ["decoy_engine.transforms.categorical"]
disable_error_code = ["return-value"]

[[tool.mypy.overrides]]
module = ["decoy_engine.transforms.faker_based"]
disable_error_code = ["index"]

# internal.* type-debt allowlist. V2.0-C split internal/helpers.py into
# crypto/fs/faker_setup (now strict-gated). What remains in internal/
# is the V1 legacy stack that V2.1 hard-deletes.

# V1 legacy IOHandler base class. V2.1 delete with the Masker stack.
[[tool.mypy.overrides]]
module = ["decoy_engine.internal.base"]
disable_error_code = ["import-untyped"]

# V1 legacy Masker large-file path. V2.1 delete.
[[tool.mypy.overrides]]
module = ["decoy_engine.internal.large_file_processor"]
disable_error_code = ["assignment"]

# V1 legacy logging wrapper. V2.0-D / V2.1 audits replacement with the
# context.Logger Protocol everywhere.
[[tool.mypy.overrides]]
module = ["decoy_engine.internal.logging"]
disable_error_code = ["assignment"]

# V1 legacy MaskerConfigValidator + GeneratorConfigValidator. V2.1
# delete; the V2 graph validator stack (decoy_engine.graph.validators)
# is the replacement.
[[tool.mypy.overrides]]
module = ["decoy_engine.internal.validator"]
disable_error_code = ["attr-defined", "index"]

# connectors.* — V1.5 DB-connector cleanup + V2.0-C boundary; for now
# every connector enumerates its own debt categories independently so the
# V1.5 sweep can shrink each list one connector at a time.
[[tool.mypy.overrides]]
module = ["decoy_engine.connectors"]
disable_error_code = ["misc"]

[[tool.mypy.overrides]]
module = ["decoy_engine.connectors.csv_connector"]
disable_error_code = ["arg-type"]

[[tool.mypy.overrides]]
module = ["decoy_engine.connectors.database"]
disable_error_code = ["assignment"]

[[tool.mypy.overrides]]
module = ["decoy_engine.connectors.factory"]
disable_error_code = ["assignment"]

[[tool.mypy.overrides]]
module = ["decoy_engine.connectors.fixed_width"]
disable_error_code = ["arg-type", "no-redef", "return-value", "var-annotated"]

[[tool.mypy.overrides]]
module = ["decoy_engine.connectors.gcs"]
disable_error_code = ["attr-defined", "import-untyped"]

[[tool.mypy.overrides]]
module = ["decoy_engine.connectors.s3"]
disable_error_code = ["import-untyped"]

[[tool.mypy.overrides]]
module = ["decoy_engine.connectors.sftp"]
disable_error_code = ["attr-defined", "call-arg", "import-untyped"]

# transforms.registry — V2.0-B validator-split sprint refactors the
# strategy registry; abstract + var-annotated debt clears with it.
[[tool.mypy.overrides]]
module = ["decoy_engine.transforms.registry"]
disable_error_code = ["abstract", "assignment", "attr-defined", "var-annotated"]

[tool.coverage.run]
source = ["src/decoy_engine"]
branch = true
omit = [
    "*/tests/*",
    "*/__main__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
# Coverage is not gated as part of V2.0-prep. The configuration exists so
# `pytest --cov` produces useful output for V2.0-A's per-module unit-test
# work. A floor lands once V2.0-C closes and the test surface stabilizes.
fail_under = 0

# Default PII Disguise — generic starter pack.
# Recommended by FORECAST whenever the profile contains any common-PII fields
# but the data doesn't specifically smell like a regulated dataset.

id: default
name: "Default PII Disguise"
summary: "Generic PII starter pack: email, phone, name, ZIP."
primary_buyer: "Everyone"

triggers:
  any_detectors:
    - email
    - us_phone
    - person_name
  min_score: 0.3

# Strict-mode fail-safe contract (detection sprint, V1). The Disguise apply
# step refuses to run if any expected_field is unmatched in the scan's
# detection + override set. Strings are single detectors; nested lists are
# any-of groups (e.g. any of the three date detectors satisfies the date
# expectation). The user can switch to permissive mode to bypass with an
# audit trail; the default is strict.
expected_fields:
  - email
  - [first_name, last_name, person_name]
  - us_phone
  - us_zip
  - [iso_date, us_date, eu_date]

field_rules:
  - detectors: [email]
    mask: faker
    params:
      faker_type: email
    why: "Replace email with a deterministic fake email."

  - detectors: [person_name]
    mask: faker
    params:
      faker_type: name
    why: "Replace person name with a realistic fake name."

  - detectors: [us_phone]
    mask: faker
    params:
      faker_type: phone_number
    why: "Replace phone number with a realistic fake."

  - detectors: [us_zip]
    mask: faker
    params:
      # The engine's whitelist registers this US provider as ``zipcode``
      # (see decoy_engine/internal/helpers.py). ``postcode`` is a real
      # Faker method but is not exposed, so the substitution fell back
      # to ``word`` with a per-row warning. Stick to ``zipcode`` here.
      faker_type: zipcode
    why: "Replace ZIP with a fake postal code."

  - detectors: [iso_date, us_date, eu_date]
    mask: date_shift
    params:
      jitter_days: 30
    why: "Shift dates by a random offset to break correlations."

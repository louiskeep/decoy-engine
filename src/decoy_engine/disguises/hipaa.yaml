# HIPAA Safe Harbor - full 18-identifier coverage (Item 31 phase 3).
#
# HIPAA Privacy Rule Safe Harbor identifiers (45 CFR 164.514(b)(2)):
#  A  Names                       -> person_name -> faker
#  B  Geographic data (<=ZIP)     -> us_zip -> truncate to 3 digits
#  C  Dates                       -> iso_date / us_date / eu_date -> date_shift
#  D  Telephone numbers           -> us_phone -> faker
#  E  Fax numbers                 -> fax_number -> faker
#  F  Electronic mail             -> email -> faker
#  G  SSNs                        -> ssn -> hash
#  H  Medical record numbers      -> mrn -> hash
#  I  Health-plan beneficiary IDs -> health_plan_id -> hash
#  J  Account numbers             -> iban -> hash (bank accounts via IBAN)
#  K  Certificate/license numbers -> license_num -> hash
#  L  Vehicle identifiers / VINs  -> vehicle_id -> hash
#  M  Device identifiers          -> device_id -> hash
#  N  Web URLs                    -> url -> redact
#  O  IP addresses                -> ipv4 -> faker (ipv4)
#  P  Biometric identifiers       -> biometric_id -> redact
#  Q  Full-face photographs       -> (path-based; flagged by biometric_id name hints)
#  R  Any unique identifying code -> covered by ssn / npi / mrn / health_plan_id
#
# Clinical identifiers (beyond Safe Harbor):
#  ICD-10-CM diagnosis codes -> icd10 -> truncate (3-char category generalisation)
#  National Provider IDs     -> npi -> hash (FK-stable across provider analytics)

id: hipaa
name: "HIPAA Safe Harbor"
summary: "Full HIPAA Safe Harbor (45 CFR 164.514(b)(2)): all 18 identifier categories + clinical detectors."
regulation: "HIPAA Privacy Rule - Safe Harbor (45 CFR 164.514(b)(2))"
primary_buyer: "Healthcare data engineers"

triggers:
  any_detectors:
    - ssn
    - mrn
    - npi
    - icd10
  co_occurrence:
    - [iso_date, us_zip, person_name]
    - [us_date, us_zip, person_name]
    # SSN + name + date is the canonical HIPAA dataset shape (patient roster
    # with identifiers + visit/DOB dates). Including it explicitly so HIPAA
    # outranks generic-PII bundles when the data is healthcare-shaped.
    - [ssn, person_name, iso_date]
    - [ssn, person_name, us_date]
    - [iso_date, mrn]
    - [us_zip, mrn]
  min_score: 0.4

# Strict-mode fail-safe contract (detection sprint, V1). The Disguise apply
# step refuses to run if any expected_field is unmatched in the scan's
# detection + override set. HIPAA Safe Harbor enumerates 18 identifier
# categories; each row below corresponds to one (A–R per 45 CFR
# 164.514(b)(2)). Strings are single detectors; nested lists are any-of
# groups. Permissive mode bypasses with an audit trail.
expected_fields:
  - [first_name, last_name, person_name]   # A: Names
  - us_zip                                  # B: Geographic
  - [iso_date, us_date, eu_date]            # C: Dates (DOB + visit dates)
  - us_phone                                # D: Telephone
  - fax_number                              # E: Fax
  - email                                   # F: Email
  - ssn                                     # G: SSN
  - mrn                                     # H: Medical Record Numbers
  - health_plan_id                          # I: Health-plan beneficiary
  - iban                                    # J: Account numbers (bank)
  - license_num                             # K: Certificate / license
  - vehicle_id                              # L: VIN / vehicle
  - device_id                               # M: Device identifiers
  - url                                     # N: URLs
  - ipv4                                    # O: IP addresses
  - biometric_id                            # P: Biometric
  - address                                 # B (street; ZIP handled above)
  # Clinical (beyond SH):
  - icd10                                   # ICD-10-CM diagnosis codes
  - npi                                     # National Provider Identifier

field_rules:
  # A: Names (split per-detector so first_name and last_name columns
  # get the matching Faker provider instead of the catch-all faker.name).
  - detectors: [first_name]
    mask: faker
    params:
      faker_type: first_name
    why: "Safe Harbor §A: first names -> realistic fake first name."

  - detectors: [last_name]
    mask: faker
    params:
      faker_type: last_name
    why: "Safe Harbor §A: last names -> realistic fake last name."

  - detectors: [person_name]
    mask: faker
    params:
      faker_type: name
    why: "Safe Harbor §A: full names -> realistic fake name."

  # B: Geographic data (ZIP -> 3-digit prefix)
  - detectors: [us_zip]
    mask: truncate
    params:
      length: 3
    why: "Safe Harbor §B: ZIP -> first 3 digits. Full ZIPs only allowed for ZCTAs >20K population."

  # B (street): street-address columns get a realistic fake street address.
  # Complements the us_zip rule above; together they cover Safe Harbor
  # geographic data (street + ZIP). Closes the gap where `address` was an
  # expected_field with no field_rule, so streets passed through unmasked.
  - detectors: [address]
    mask: faker
    params:
      faker_type: street_address
    why: "Safe Harbor section B: street-address columns get a realistic fake street address; ZIP is generalised separately by the us_zip rule above."

  # C: Dates (all three date formats)
  - detectors: [iso_date, us_date, eu_date]
    mask: date_shift
    params:
      jitter_days: 30
    why: "Safe Harbor §C: dates -> ±30d random shift. Preserves analytic distribution; breaks correlations."

  # D: Telephone numbers
  - detectors: [us_phone]
    mask: faker
    params:
      faker_type: phone_number
    why: "Safe Harbor §D: telephone -> realistic fake."

  # E: Fax numbers
  - detectors: [fax_number]
    mask: faker
    params:
      faker_type: phone_number
    why: "Safe Harbor §E: fax numbers -> realistic fake phone number."

  # F: Electronic mail addresses
  - detectors: [email]
    mask: faker
    params:
      faker_type: email
    why: "Safe Harbor §F: email -> realistic fake."

  # G: Social Security Numbers - FPE keeps the 9-digit + dash shape;
  # determinism is provided by the instance master key so FK joins
  # survive masking. (Pre-V1 hashed; FPE strictly upgrades both shape
  # and join behavior.)
  - detectors: [ssn]
    mask: fpe
    params:
      charset: digits
    why: "Safe Harbor §G: SSN -> format-preserving digits; deterministic so FK joins survive."

  # H: Medical record numbers
  - detectors: [mrn]
    mask: fpe
    params:
      charset: alphanum
    why: "Safe Harbor §H: medical record numbers -> format-preserving alphanumeric; joins survive."

  # I: Health-plan beneficiary numbers (no universal format: redact)
  - detectors: [health_plan_id]
    mask: redact
    params:
      redact_with: "[REDACTED]"
    why: "Safe Harbor §I: health-plan IDs vary too widely for FPE in V1; redacted."

  # J: Account numbers (IBAN covers bank accounts; general account columns
  #     are caught by health_plan_id / license_num name-hint rules when named
  #     accordingly, e.g. account_id, account_num)
  - detectors: [iban]
    mask: fpe
    params:
      charset: ALPHANUM
    why: "Safe Harbor §J: IBAN -> format-preserving alphanumeric; joins survive."

  # K: Certificate and license numbers (no universal format: redact)
  - detectors: [license_num]
    mask: redact
    params:
      redact_with: "[REDACTED]"
    why: "Safe Harbor §K: license/certificate formats vary too widely for FPE in V1."

  # L: Vehicle identifiers and serial numbers (VINs)
  - detectors: [vehicle_id]
    mask: fpe
    params:
      charset: ALPHANUM
    why: "Safe Harbor §L: VINs -> format-preserving 17-char alphanumeric; joins survive."

  # M: Device identifiers and serial numbers (no universal format: redact)
  - detectors: [device_id]
    mask: redact
    params:
      redact_with: "[REDACTED]"
    why: "Safe Harbor §M: device identifier formats vary too widely for FPE in V1."

  # N: Web Universal Resource Locators (URLs)
  - detectors: [url]
    mask: redact
    params:
      redact_with: "[URL REDACTED]"
    why: "Safe Harbor §N: URLs -> redacted. URLs often embed patient or provider identifying path components."

  # O: IP addresses
  - detectors: [ipv4]
    mask: faker
    params:
      faker_type: ipv4
    why: "Safe Harbor §O: IPv4 addresses -> realistic fake IP."

  # P: Biometric identifiers (fingerprints, retina scans, voice prints, etc.)
  - detectors: [biometric_id]
    mask: redact
    params:
      redact_with: "[BIOMETRIC REDACTED]"
    why: "Safe Harbor §P: biometric identifiers -> redacted. Biometrics are permanent; any exposure is irreversible."

  # Clinical: ICD-10-CM diagnosis codes -> generalise to 3-char category
  - detectors: [icd10]
    mask: truncate
    params:
      length: 3
    why: "ICD-10-CM codes -> 3-char category truncation (e.g. 'S72.001A' -> 'S72'). Preserves analytic cohort grouping while removing subcategory specificity per Safe Harbor §C guidance on clinical dates."

  # Clinical: National Provider Identifiers -> format-preserving 10-digit
  - detectors: [npi]
    mask: fpe
    params:
      charset: digits
    why: "National Provider Identifiers -> format-preserving 10-digit; deterministic so provider-level joins survive."
